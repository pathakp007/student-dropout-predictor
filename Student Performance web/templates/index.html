<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduShield AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: url("/static/iilm.png") no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: none;
        }

        h3 {
            font-weight: 600;
            color: #333;
        }

        label {
            font-weight: 500;
            margin-top: 10px;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            border: none;
            border-radius: 30px;
            font-weight: 600;
            transition: 0.3s ease;
        }

        .btn-primary:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .card {
                padding: 20px !important;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card p-4 shadow-lg">
        <h3 class="text-center mb-4">🎓 EduShield AI</h3>

        <form action="/predict" method="post">

            <label>Marital Status</label>
            <select name="Marital_status" class="form-control mb-3">
                <option value="1">Single</option>
                <option value="2">Married</option>
            </select>

            <label>Application Mode</label>
            <select name="Application_mode" class="form-control mb-3">
                <option value="17">General Contingent (Phase 2)</option>
                <option value="1">General Contingent (Phase 1)</option>
                <option value="42">Transfer</option>
            </select>

            <label>Course</label>
            <select name="Course" class="form-control mb-3">
                <option value="171">Animation & Multimedia</option>
                <option value="9119">Informatics Engineering</option>
                <option value="9147">Management</option>
                <option value="9500">Nursing</option>
            </select>

            <label>Tuition Fees Up To Date?</label>
            <select name="Tuition_fees_up_to_date" class="form-control mb-3">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Scholarship Holder?</label>
            <select name="Scholarship_holder" class="form-control mb-3">
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <label>Number of Backlogs</label>
            <input type="number" min="0" max="6" name="Backlogs" class="form-control" required>

            <label>Semester 1 GPA (0 - 10)</label>
            <input type="number" step="0.01" min="0" max="10" name="Sem1_GPA" class="form-control" required>

            <label>Semester 2 GPA (0 - 10)</label>
            <input type="number" step="0.01" min="0" max="10" name="Sem2_GPA" class="form-control" required>

            <button class="btn btn-primary w-100 mt-4">Predict Dropout Risk</button>

            <p class="text-center mt-3"><b>Model Accuracy:</b> ~90%</p>

        </form>
    </div>
</div>

</body>
</html>
