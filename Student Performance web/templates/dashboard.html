<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#eef2f7;">

<div class="container mt-5">
    <div class="card p-4 shadow text-center">

        <h3>📊 Prediction Dashboard</h3>

        <p>Total Predictions: <b>{{ total }}</b></p>
        <p class="text-danger">High Risk: <b>{{ high }}</b></p>
        <p class="text-warning">Medium Risk: <b>{{ medium }}</b></p>
        <p class="text-success">Low Risk: <b>{{ low }}</b></p>

        <canvas id="riskChart"></canvas>

        <div class="mt-3">
            <a href="/" class="btn btn-primary">Back to Prediction</a>
        </div>

    </div>
</div>

<script>
const high = Number("{{ high }}");
const medium = Number("{{ medium }}");
const low = Number("{{ low }}");

new Chart(document.getElementById('riskChart'), {
    type: 'pie',
    data: {
        labels: ['High', 'Medium', 'Low'],
        datasets: [{
            data: [high, medium, low],
            backgroundColor: ['#dc3545', '#ffc107', '#28a745']
        }]
    }
});
</script>

</body>
</html>
